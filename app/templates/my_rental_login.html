<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Моя аренда</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#2f80ed">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="mobile-shell">
        <div class="hero-card">
            <div class="logo-badge">Z</div>
            <h1 class="hero-title">Моя аренда</h1>
            <p class="hero-subtitle">Проверьте статус текущего powerbank</p>

            <form method="post" action="/my-rental" class="rental-form">
                <input type="text" name="phone" placeholder="Номер телефона" required>
                <input type="password" name="pin" placeholder="PIN" required>
                <button type="submit" class="btn">Показать аренду</button>
            </form>

            <div class="mini-links">
                <a href="/">На главную</a>
                <a href="/return">Вернуть заряд</a>
            </div>
        </div>
    </div>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/static/service-worker.js");
        });
      }
    </script>
</body>
</html>
