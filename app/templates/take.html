<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Взять заряд</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#2f80ed">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="mobile-shell">
        <div class="hero-card">
            <div class="logo-badge">Z</div>
            <h1 class="hero-title">Взять заряд</h1>
            <p class="hero-subtitle">Введите номер телефона и PIN</p>

            <form method="post" action="/take" class="rental-form">
                <input type="text" name="phone" placeholder="Номер телефона" required>
                <input type="password" name="pin" placeholder="PIN" required>
                <button type="submit" class="btn">Открыть ячейку</button>
            </form>

            <div class="mini-links">
                <a href="/">Главная</a>
                <a href="/my-rental">Моя аренда</a>
            </div>
        </div>
    </div>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/static/service-worker.js");
        });
      }
    </script>
</body>
</html>
