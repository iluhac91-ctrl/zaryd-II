<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Закрытие ячейки</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/style.css">
    {% if next_url %}
        <meta http-equiv="refresh" content="0;url={{ next_url }}">
    {% else %}
        <meta http-equiv="refresh" content="1;url={{ refresh_url }}">
    {% endif %}
</head>
<body class="kiosk-body kiosk-body-v2">

<div class="kiosk-wait-screen">

    <div class="kiosk-wait-card">
        <div class="kiosk-wait-badge">Шаг 2</div>
        <div class="kiosk-wait-icon">🔒</div>

        <div class="kiosk-wait-title">Закройте дверцу</div>
        <div class="kiosk-wait-text">
            Закройте ячейку №{{ slot_number }}.<br>
            После этого операция завершится.
        </div>

        <div class="kiosk-wait-status">
            {% if door_closed %}
                Дверца закрыта. Завершаем операцию…
            {% else %}
                Ожидаем закрытие дверцы…
            {% endif %}
        </div>

        <div class="kiosk-spinner v2"></div>
    </div>

</div>

</body>
</html>
