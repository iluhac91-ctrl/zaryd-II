<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>IIBOX</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
}

h1 {
  margin-top: 20px;
}

.input-box {
  width: 400px;
  margin: 10px;
}

input {
  width: 100%;
  height: 60px;
  font-size: 28px;
  text-align: center;
  border-radius: 10px;
  border: none;
}

.keyboard {
  display: grid;
  grid-template-columns: repeat(3, 120px);
  gap: 15px;
  margin-top: 20px;
}

.key {
  height: 80px;
  font-size: 28px;
  border-radius: 12px;
  background: #1e293b;
  display: flex;
  align-items: center;
  justify-content: center;
}

.key:active {
  background: #334155;
}

.submit {
  margin-top: 20px;
  padding: 15px 40px;
  font-size: 24px;
  background: #22c55e;
  border-radius: 12px;
}
</style>
</head>

<body>

<h1>Взять заряд</h1>

<div class="input-box">
  <input id="phone" placeholder="+7XXXXXXXXXX" readonly>
</div>

<div class="input-box">
  <input id="pin" placeholder="PIN" type="password" readonly>
</div>

<div class="keyboard" id="keyboard"></div>

<div class="submit" onclick="submit()">Продолжить</div>

<script>
let active = "phone";

const keyboard = document.getElementById("keyboard");

function setActive(field) {
  active = field;
}

document.getElementById("phone").onclick = () => setActive("phone");
document.getElementById("pin").onclick = () => setActive("pin");

const keys = ["1","2","3","4","5","6","7","8","9","←","0","OK"];

keys.forEach(k => {
  const div = document.createElement("div");
  div.className = "key";
  div.innerText = k;
  div.onclick = () => press(k);
  keyboard.appendChild(div);
});

function press(k) {
  let input = document.getElementById(active);

  if (k === "←") {
    input.value = input.value.slice(0, -1);
    return;
  }

  if (k === "OK") {
    if (active === "phone") {
      active = "pin";
    }
    return;
  }

  input.value += k;
}

function submit() {
  const phone = document.getElementById("phone").value;
  const pin = document.getElementById("pin").value;

  window.location.href = `/take?phone=${encodeURIComponent(phone)}&pin=${encodeURIComponent(pin)}`;
}
</script>

</body>
</html>
