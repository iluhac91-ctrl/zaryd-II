<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация — IIBOX</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="kiosk-body kiosk-body-v2">

<div class="kiosk-form-v2">
    <div class="kiosk-form-card-v2">
        <div class="kiosk-form-header-v2">
            <div class="kiosk-form-title-v2">Регистрация</div>
            <div class="kiosk-form-subtitle-v2">
                Для первой аренды создайте аккаунт
            </div>
        </div>

        <form method="post" action="/kiosk/register" class="kiosk-form-v2-form">
            <input type="text" name="phone" placeholder="Номер телефона" required>
            <input type="password" name="pin" placeholder="Придумайте PIN-код" required>
            <button type="submit" class="kiosk-submit-v2">Зарегистрироваться</button>
        </form>

        <div class="kiosk-back-v2">
            <a href="/kiosk" class="kiosk-back-btn-v2">Назад</a>
        </div>
    </div>
</div>

<script src="/static/kiosk_idle_timeout.js"></script>
</body>
</html>
