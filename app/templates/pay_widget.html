<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1024, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Оплата IIBOX</title>

  <script src="https://widget.cloudpayments.ru/bundles/cloudpayments.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 1024px;
      height: 600px;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      text-align: center;
    }

    h1 {
      font-size: 28px;
    }

    p {
      font-size: 18px;
      color: #cbd5e1;
    }

    button {
      margin-top: 20px;
      padding: 14px 24px;
      font-size: 20px;
      border-radius: 12px;
      border: none;
      background: #22c55e;
      color: white;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>Оплата аренды</h1>
  <p>Нажмите кнопку ниже для оплаты</p>
  <button onclick="pay()">Оплатить</button>
</div>

<script>
function pay() {
  var widget = new cp.CloudPayments();

  widget.pay('auth', {
    publicId: "{{ public_id }}",
    description: "Аренда IIBOX",
    amount: 100,
    currency: "RUB",
    accountId: "{{ account_id }}",
    skin: "modern"
  },
  {
    onSuccess: function (options) {
      fetch("/save-token-debug", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          account_id: options.accountId
        })
      })
      .then(r => r.json())
      .then(data => {
        setTimeout(() => {
          window.location.href = "/pay-success-info";
        }, 1000);
      });
    },

    onFail: function () {
      alert("Оплата не завершена");
    }
  });
}
</script>

</body>
</html>
