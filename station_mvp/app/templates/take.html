<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Взять заряд</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Взять заряд</h1>
        <form method="post" action="/take">
            <input type="text" name="phone" placeholder="Номер телефона" required>
            <input type="password" name="pin" placeholder="PIN" required>
            <button type="submit" class="btn">Получить заряд</button>
        </form>
        <a class="link" href="/">Назад</a>
    </div>
</body>
</html>
